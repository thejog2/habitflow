{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container text-center" style="padding: 4rem 0;">
    <h1 class="page-title" style="font-size: 2.4rem;">Oops! This page wandered off…</h1>
    <p class="mt-3" style="font-size: 1.2rem; color: var(--neutral-dark);">
        We couldn’t find the page you were looking for.  
        It might have been moved, deleted, or never existed.
    </p>

    <div class="mt-4">
        <img src="{% static 'images/checkbox-tick.png' %}" 
             alt="HabitFlow icon" 
             style="width: 120px; opacity: 0.85;">
    </div>

    <a href="{% url 'dashboard' %}" class="btn btn-primary mt-4">
        Back to Dashboard
    </a>
</div>
{% endblock %}
