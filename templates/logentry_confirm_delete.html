{% extends "base.html" %}

{% block content %}
<h2>Delete Log Entry</h2>

<p>Are you sure you want to delete this log entry?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'habit_detail' object.habit.pk %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
