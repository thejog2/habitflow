{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <!-- Centered Layout -->
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <!-- Page Title (now aligned with the card) -->
            <h1 class="page-title mb-4">
                {{ view.object.pk|yesno:"Edit Habit,Create Habit" }}
            </h1>

            <!-- Form Card -->
            <div class="card habit-form-card">

                <form method="post" class="habit-form">
                    {% csrf_token %}

                    <div class="form-styled">

                        {{ form.non_field_errors }}

                        {% for field in form %}
                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                            <div class="text-danger small mt-1">
                                {{ field.errors }}
                            </div>
                            {% endif %}

                        </div>
                        {% endfor %}

                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">
                        Save Habit
                    </button>

                </form>

            </div>

            <a href="{% url 'habit_list' %}" class="btn btn-secondary w-100 mt-3">
                Back to Habits
            </a>

        </div>
    </div>

</div>

{% endblock %}
