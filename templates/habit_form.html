{% extends "base.html" %}

{% block content %}
<h1>{{ view.object.pk|yesno:"Edit Habit,Create Habit" }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Save Habit
    </button>
</form>

<a href="{% url 'habit_list' %}" class="btn btn-secondary mt-3">Back to Habits</a>
{% endblock %}
