{% extends "base.html" %}

{% block content %}
<h1>Delete Habit</h1>

<p>Are you sure you want to delete the habit "<strong>{{ habit.name }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'habit_detail' habit.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
