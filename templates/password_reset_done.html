{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <h1 class="page-title mb-4 text-center">
                Check Your Email
            </h1>

            <div class="card reset-card p-4">

                <p class="reset-text">
                    If an account exists with the email you entered, a password reset link has been sent.
                    Please check your inbox.
                </p>

                <a href="{% url 'login' %}" class="btn btn-secondary w-100 mt-3">
                    Return to Login
                </a>

            </div>

        </div>
    </div>

</div>

{% endblock %}
